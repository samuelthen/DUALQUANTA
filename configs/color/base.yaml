# Tables 3 & 4: DUALQUANTA and color sensing — shared defaults
# Ablation 3 (cmos_luma_softmax) unless overridden.
# Stage 1 checkpoint: checkpoints/table3_4_DUALQUANTA/stage1_mono_dcn_h8.pth
# Stage 2 is trained by train_color.py --ablation 3 --stage1_ckpt ...
model:
  T: 11
  bins: 7
  cmos_sigma: 2.0

data:
  ppp: 3.25
  bins: 7
  crop: 256
  eval_crop: 256
  sps: 1
  eval_frac: 0.1
  seed: 42
  workers: 4

train:
  epochs: 100
  steps_per_epoch: 2000
  batch: 4
  lr: 2.0e-4
  weight_decay: 1.0e-4
  betas: [0.9, 0.9]
  lr_min: 1.0e-6
  save_every: 5
  wandb_project: "spad-net-pub"
